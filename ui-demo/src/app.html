<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <title>Plexus</title>
    <script>
      // Apply theme before first paint to avoid flash.
      try {
        const stored = localStorage.getItem('plexus-theme');
        const prefersLight = stored ? stored === 'light' : false;
        document.documentElement.classList.toggle('dark', !prefersLight);
      } catch {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-bg text-text antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
