receptors:
  security-alerter:
    uuid: "r1a2b3c4-d5e6-7890-abcd-ef1234567890"
    type: alerter
    description: "Flags and alerts on security anomalies and criticals"
    listens_to:
      - sec-gate-01
      - sec-auth-01
    config:
      severity_filter:
        - warning
        - anomaly
        - critical
      alert_label: "SECURITY ALERT"

  ingestion-watcher:
    uuid: "r2b3c4d5-e6f7-8901-bcde-f12345678901"
    type: alerter
    description: "Flags anomalous ingestion pipeline events"
    listens_to:
      - ing-pipeline-01
      - ing-embed-01
    config:
      severity_filter:
        - anomaly
        - critical
      alert_label: "INGESTION ANOMALY"

  health-aggregator:
    uuid: "r3c4d5e6-f7a8-9012-cdef-123456789012"
    type: health_aggregator
    description: "Aggregates health signals across all nodes"
    listens_to:
      - health-monitor-01
      - build-engine-01
      - fixer-agent-01
      - agent-worker-01
    config:
      severity_filter:
        - info
        - notice
        - warning
        - anomaly
        - critical
