<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Plexus — Signal Nervous System</title>
  <desc>Animated README header showing nodes reporting to a central hub</desc>

  <defs>
    <style>
      @keyframes hub-pulse {
        0%,100% { r: 14; opacity: 0.9; }
        50% { r: 17; opacity: 1; }
      }
      @keyframes hub-ring1 {
        0% { r: 18; opacity: 0.5; }
        100% { r: 36; opacity: 0; }
      }
      @keyframes hub-ring2 {
        0% { r: 18; opacity: 0.4; }
        100% { r: 50; opacity: 0; }
      }
      @keyframes node-appear {
        0%,100% { opacity: 0; }
        10%,90% { opacity: 1; }
        45%,55% { opacity: 0.4; }
      }
      @keyframes dash-travel {
        0% { stroke-dashoffset: 80; opacity: 0; }
        15% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0.8; }
      }

      .node-1 { animation: node-appear 8s ease-in-out 0s infinite; }
      .node-2 { animation: node-appear 8s ease-in-out 1.2s infinite; }
      .node-3 { animation: node-appear 8s ease-in-out 2.4s infinite; }
      .node-4 { animation: node-appear 8s ease-in-out 3.6s infinite; }
      .node-5 { animation: node-appear 8s ease-in-out 4.8s infinite; }

      .line-1 { animation: dash-travel 8s ease-in 0.5s infinite; }
      .line-2 { animation: dash-travel 8s ease-in 1.7s infinite; }
      .line-3 { animation: dash-travel 8s ease-in 2.9s infinite; }
      .line-4 { animation: dash-travel 8s ease-in 4.1s infinite; }
      .line-5 { animation: dash-travel 8s ease-in 5.3s infinite; }

      .hub-core { animation: hub-pulse 2s ease-in-out infinite; }
      .hub-ring1 { animation: hub-ring1 2s ease-out infinite; }
      .hub-ring2 { animation: hub-ring2 2s ease-out 0.4s infinite; }
    </style>
  </defs>

  <rect width="680" height="200" rx="12" fill="#080810"/>

  <!-- node 1 -->
  <g class="node-1">
    <circle cx="120" cy="52" r="5" fill="#534AB7"/>
    <circle cx="120" cy="52" r="9" fill="none" stroke="#534AB7" stroke-width="0.5" opacity="0.4"/>
    <text x="120" y="42" font-family="ui-monospace,monospace" font-size="8" fill="#534AB7" text-anchor="middle" opacity="0.8">sec-gate</text>
  </g>
  <line class="line-1" x1="120" y1="52" x2="340" y2="80"
    stroke="#534AB7" stroke-width="1" stroke-dasharray="6,4" stroke-dashoffset="80"/>

  <!-- node 2 -->
  <g class="node-2">
    <circle cx="220" cy="28" r="5" fill="#0F6E56"/>
    <circle cx="220" cy="28" r="9" fill="none" stroke="#0F6E56" stroke-width="0.5" opacity="0.4"/>
    <text x="220" y="18" font-family="ui-monospace,monospace" font-size="8" fill="#0F6E56" text-anchor="middle" opacity="0.8">ing-pipe</text>
  </g>
  <line class="line-2" x1="220" y1="28" x2="340" y2="80"
    stroke="#0F6E56" stroke-width="1" stroke-dasharray="6,4" stroke-dashoffset="80"/>

  <!-- node 3 -->
  <g class="node-3">
    <circle cx="350" cy="20" r="5" fill="#185FA5"/>
    <circle cx="350" cy="20" r="9" fill="none" stroke="#185FA5" stroke-width="0.5" opacity="0.4"/>
    <text x="350" y="10" font-family="ui-monospace,monospace" font-size="8" fill="#185FA5" text-anchor="middle" opacity="0.8">build-01</text>
  </g>
  <line class="line-3" x1="350" y1="20" x2="340" y2="80"
    stroke="#185FA5" stroke-width="1" stroke-dasharray="6,4" stroke-dashoffset="80"/>

  <!-- node 4 -->
  <g class="node-4">
    <circle cx="480" cy="28" r="5" fill="#0F6E56"/>
    <circle cx="480" cy="28" r="9" fill="none" stroke="#0F6E56" stroke-width="0.5" opacity="0.4"/>
    <text x="480" y="18" font-family="ui-monospace,monospace" font-size="8" fill="#0F6E56" text-anchor="middle" opacity="0.8">agent-01</text>
  </g>
  <line class="line-4" x1="480" y1="28" x2="340" y2="80"
    stroke="#0F6E56" stroke-width="1" stroke-dasharray="6,4" stroke-dashoffset="80"/>

  <!-- node 5 -->
  <g class="node-5">
    <circle cx="568" cy="52" r="5" fill="#534AB7"/>
    <circle cx="568" cy="52" r="9" fill="none" stroke="#534AB7" stroke-width="0.5" opacity="0.4"/>
    <text x="568" y="42" font-family="ui-monospace,monospace" font-size="8" fill="#534AB7" text-anchor="middle" opacity="0.8">health</text>
  </g>
  <line class="line-5" x1="568" y1="52" x2="340" y2="80"
    stroke="#534AB7" stroke-width="1" stroke-dasharray="6,4" stroke-dashoffset="80"/>

  <!-- central hub -->
  <circle class="hub-ring2" cx="340" cy="80" r="18" fill="none" stroke="#1D9E75" stroke-width="0.5"/>
  <circle class="hub-ring1" cx="340" cy="80" r="18" fill="none" stroke="#1D9E75" stroke-width="1"/>
  <circle cx="340" cy="80" r="14" fill="#0a1a12" stroke="#1D9E75" stroke-width="1.5"/>
  <circle class="hub-core" cx="340" cy="80" r="8" fill="#1D9E75"/>
  <text x="340" y="108" font-family="ui-monospace,monospace" font-size="8" fill="#1D9E75" text-anchor="middle" opacity="0.7">THE PLEXUS</text>

  <!-- hexagon logo -->
  <polygon points="44,128 58,120 72,128 72,144 58,152 44,144" fill="none" stroke="#534AB7" stroke-width="1.5"/>
  <polygon points="47,130 58,123 69,130 69,142 58,149 47,142" fill="#3C3489" opacity="0.6"/>
  <line x1="53" y1="136" x2="63" y2="136" stroke="#AFA9EC" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="53" cy="136" r="1.8" fill="#AFA9EC"/>
  <circle cx="63" cy="136" r="1.8" fill="#AFA9EC"/>
  <line x1="58" y1="130" x2="58" y2="142" stroke="#AFA9EC" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>

  <!-- wordmark -->
  <text x="82" y="143" font-family="ui-monospace,monospace" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="4">PLEXUS</text>
  <line x1="82" y1="151" x2="280" y2="151" stroke="#2a2a35" stroke-width="0.5"/>
  <text x="83" y="166" font-family="ui-monospace,monospace" font-size="10" fill="#534AB7" letter-spacing="3">SIGNAL NERVOUS SYSTEM</text>
  <text x="83" y="184" font-family="-apple-system,sans-serif" font-size="11" fill="#555" letter-spacing="0.3">Decentralize the sensing. Centralize the picture.</text>

</svg>
